<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>File Manager — GitHub style</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>
  <header>
    <h1>File Manager — GitHub style</h1>
    <p>Enter a GitHub repo URL (e.g. https://github.com/owner/repo) to browse its files.</p>
  </header>

  <main>
    <form id="repo-form">
      <input id="repo-url" type="url" placeholder="https://github.com/owner/repo" required />
      <input id="token" type="password" placeholder="Personal access token (optional, required for private repos)" />
      <button type="submit">Load</button>
    </form>

    <nav id="breadcrumb"></nav>
    <section id="listing" class="listing"></section>
    <section id="file-view" class="file-view hidden">
      <button id="close-file">Close</button>
      <pre id="file-content"></pre>
    </section>
  </main>

  <script src="static/app.js"></script>
</body>
</html>
